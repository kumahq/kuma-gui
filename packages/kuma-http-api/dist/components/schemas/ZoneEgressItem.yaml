type: object
properties:
  creationTime:
    description: Time at which the resource was created
    type: string
    format: date-time
    readOnly: true
  kri:
    description: Kuma Resource Identifier (KRI) of the given resource
    type: string
    readOnly: true
  labels:
    type: object
    additionalProperties:
      type: string
  modificationTime:
    description: Time at which the resource was updated
    type: string
    format: date-time
    readOnly: true
  name:
    type: string
  networking:
    description: Networking defines the address and port of the Egress to listen on.
    type: object
    properties:
      address:
        description: Address on which inbound listener will be exposed
        type: string
      admin:
        description: Admin contains configuration related to Envoy Admin API
        type: object
        properties:
          port:
            description: Port on which Envoy Admin API server will be listening
            type: integer
      port:
        description: Port of the inbound interface that will forward requests to the service.
        type: integer
  type:
    type: string
  zone:
    description: |-
      Zone field contains Zone name where egress is serving, field will be
      automatically set by Global Kuma CP
    type: string
required:
  - type
  - name
