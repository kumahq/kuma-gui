description: MeshAccessLog configures access logging for traffic between services in the mesh. It allows you to capture and export request/response logs to various backends (file, TCP, or OpenTelemetry) for monitoring, debugging, and auditing purposes.
type: object
properties:
  type:
    description: the type of the resource
    type: string
  mesh:
    description: Mesh is the name of the Kuma mesh this resource belongs to. It may be omitted for cluster-scoped resources.
    type: string
    default: default
  name:
    description: Name of the Kuma resource
    type: string
  labels:
    description: The labels to help identity resources
    type: object
    additionalProperties:
      type: string
  creationTime:
    description: Time at which the resource was created
    type: string
    format: date-time
    example: '0001-01-01T00:00:00Z'
    readOnly: true
  modificationTime:
    description: Time at which the resource was updated
    type: string
    format: date-time
    example: '0001-01-01T00:00:00Z'
    readOnly: true
  status:
    description: Status is the current status of the Kuma MeshAccessLog resource.
    type: object
    properties:
      conditions:
        type: array
        items:
          properties:
            message:
              description: |-
                message is a human readable message indicating details about the transition.
                This may be an empty string.
              type: string
              maxLength: 32768
            reason:
              description: |-
                reason contains a programmatic identifier indicating the reason for the condition's last transition.
                Producers of specific condition types may define expected values and meanings for this field,
                and whether the values are considered a guaranteed API.
                The value should be a CamelCase string.
                This field may not be empty.
              type: string
              maxLength: 1024
              minLength: 1
              pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
            status:
              description: status of the condition, one of True, False, Unknown.
              type: string
              enum:
                - 'True'
                - 'False'
                - Unknown
            type:
              description: type of condition in CamelCase or in foo.example.com/CamelCase.
              type: string
              maxLength: 316
              pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
          required:
            - message
            - reason
            - status
            - type
          type: object
    readOnly: true
  spec:
    description: Spec is the specification of the Kuma Policy resource.
    properties:
      targetRef:
        $ref: ./MeshAccessLogItem.yaml#/properties/spec/properties/targetRef
required:
  - type
  - name
  - spec

